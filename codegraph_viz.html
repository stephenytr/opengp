home%stephenp%Documents%macroquad_proj%src%main.rs", "group": "File", "title": "{'path': '/home/stephenp/Documents/macroquad_proj/~/.undodir/%home%stephenp%Documents%macroquad_proj%src%main.rs', 'name': '%home%stephenp%Documents%macroquad_proj%src%main.rs', 'relative_path': '~/.undodir/%home%stephenp%Documents%macroquad_proj%src%main.rs', 'is_dependency': False}", "color": "#baffc9"}, {"id": 3907, "label": "svg_loader.rs", "group": "File", "title": "{'path': '/home/stephenp/Documents/macroquad_proj/>/home/stephenp/Documents/coding/macroquad_proj/src/svg_loader.rs', 'name': 'svg_loader.rs', 'relative_path': '>/home/stephenp/Documents/coding/macroquad_proj/src/svg_loader.rs', 'is_dependency': False}", "color": "#baffc9"}, {"id": 11, "label": "Wall", "group": "Module", "title": "{'name': 'Wall', 'full_import_name': 'use crate::types::{RaySegment, Settings, Vector2d, Wall};'}", "color": "#97c2fc"}, {"id": 28, "label": "Error", "group": "Module", "title": "{'name': 'Error', 'full_import_name': 'pub use error::Error;'}", "color": "#97c2fc"}, {"id": 29, "label": "fs", "group": "Module", "title": "{'name': 'fs', 'full_import_name': 'use std::fs;'}", "color": "#97c2fc"}, {"id": 3915, "label": "parse_coord", "group": "Function", "title": "{'name': 'parse_coord', 'file_path': '/home/stephenp/Documents/macroquad_proj/>/home/stephenp/Documents/coding/macroquad_proj/src/svg_loader.rs', 'line_number': 6, 'end_line': 8, 'source': 'fn parse_coord(s: &str) -> Option<f64> {\\n    s.trim().parse().ok()\\n}', 'params': ['s: &str'], 'args': ['s: &str'], 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 3917, "label": "parse_path_data", "group": "Function", "title": "{'name': 'parse_path_data', 'file_path': '/home/stephenp/Documents/macroquad_proj/>/home/stephenp/Documents/coding/macroquad_proj/src/svg_loader.rs', 'line_number': 10, 'end_line': 144, 'source': 'fn parse_path_data(d: &str) -> Vec<(f64, f64)> {\\n    let mut points = Vec::new();\\n    let mut current_x = 0.0;\\n    let mut current_y = 0.0;\\n\\n    let tokens: Vec<&str> = d.split_whitespace().collect();\\n    let mut i = 0;\\n\\n    while i < tokens.len() {\\n        match tokens[i] {\\n            \"M\" => {\\n                if i + 2 < tokens.len() {\\n                    if let (Some(x), Some(y)) =\\n                        (parse_coord(tokens[i + 1]), parse_coord(tokens[i + 2]))\\n                    {\\n                        current_x = x;\\n                        current_y = y;\\n                        points.push((x, y));\\n                        i += 3;\\n                        continue;\\n                    }\\n                }\\n                i += 1;\\n            }\\n            \"m\" => {\\n                if i + 2 < tokens.len() {\\n                    if let (Some(x), Some(y)) =\\n                        (parse_coord(tokens[i + 1]), parse_coord(tokens[i + 2]))\\n                    {\\n                        current_x += x;\\n                        current_y += y;\\n                        points.push((current_x, current_y));\\n                        i += 3;\\n                        continue;\\n                    }\\n                }\\n                i += 1;\\n            }\\n            \"L\" => {\\n                if i + 2 < tokens.len() {\\n                    if let (Some(x), Some(y)) =\\n                        (parse_coord(tokens[i + 1]), parse_coord(tokens[i + 2]))\\n                    {\\n                        current_x = x;\\n                        current_y = y;\\n                        points.push((x, y));\\n                        i += 3;\\n                        continue;\\n                    }\\n                }\\n                i += 1;\\n            }\\n            \"l\" => {\\n                if i + 2 < tokens.len() {\\n                    if let (Some(x), Some(y)) =\\n                        (parse_coord(tokens[i + 1]), parse_coord(tokens[i + 2]))\\n                    {\\n                        current_x += x;\\n                        current_y += y;\\n                        points.push((current_x, current_y));\\n                        i += 3;\\n                        continue;\\n                    }\\n                }\\n                i += 1;\\n            }\\n            \"H\" => {\\n                if i + 1 < tokens.len() {\\n                    if let Some(x) = parse_coord(tokens[i + 1]) {\\n                        current_x = x;\\n                        points.push((x, current_y));\\n                        i += 2;\\n                        continue;\\n                    }\\n                }\\n                i += 1;\\n            }\\n            \"h\" => {\\n                if i + 1 < tokens.len() {\\n                    if let Some(x) = parse_coord(tokens[i + 1]) {\\n                        current_x += x;\\n                        points.push((current_x, current_y));\\n                        i += 2;\\n                        continue;\\n                    }\\n                }\\n                i += 1;\\n            }\\n            \"V\" => {\\n                if i + 1 < tokens.len() {\\n                    if let Some(y) = parse_coord(tokens[i + 1]) {\\n                        current_y = y;\\n                        points.push((current_x, y));\\n                        i += 2;\\n                        continue;\\n                    }\\n                }\\n                i += 1;\\n            }\\n            \"v\" => {\\n                if i + 1 < tokens.len() {\\n                    if let Some(y) = parse_coord(tokens[i + 1]) {\\n                        current_y += y;\\n                        points.push((current_x, current_y));\\n                        i += 2;\\n                        continue;\\n                    }\\n                }\\n                i += 1;\\n            }\\n            \"Z\" | \"z\" => {\\n                if points.len() > 1 {\\n                    points.push(points[0]);\\n                }\\n                i += 1;\\n            }\\n            _ => {\\n                if let Ok(x) = tokens[i].parse::<f64>() {\\n                    if i + 1 < tokens.len() {\\n                        if let Ok(y) = tokens[i + 1].parse::<f64>() {\\n                            current_x = x;\\n                            current_y = y;\\n                            points.push((x, y));\\n                            i += 2;\\n                            continue;\\n                        }\\n                    }\\n                }\\n                i += 1;\\n            }\\n        }\\n    }\\n\\n    points\\n}', 'params': ['d: &str'], 'args': ['d: &str'], 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 3919, "label": "extract_paths", "group": "Function", "title": "{'name': 'extract_paths', 'file_path': '/home/stephenp/Documents/macroquad_proj/>/home/stephenp/Documents/coding/macroquad_proj/src/svg_loader.rs', 'line_number': 146, 'end_line': 176, 'source': 'fn extract_paths(svg: &str) -> Vec<Wall> {\\n    let mut results = Vec::new();\\n    let mut i = 0;\\n\\n    while let Some(start) = svg[i..].find(\"d=\\\\\"\") {\\n        let start_pos = i + start + \"d=\\\\\"\".len();\\n        if let Some(end_pos_rel) = svg[start_pos..].find(\\'\"\\') {\\n            let end_pos = start_pos + end_pos_rel;\\n            let path_data = &svg[start_pos..end_pos];\\n            let points = parse_path_data(path_data);\\n\\n            for j in 0..points.len().saturating_sub(1) {\\n                results.push(Wall {\\n                    a: crate::Vector2d {\\n                        x: points[j].0,\\n                        y: points[j].1,\\n                    },\\n                    b: crate::Vector2d {\\n                        x: points[j + 1].0,\\n                        y: points[j + 1].1,\\n                    },\\n                });\\n            }\\n            i = end_pos + 1;\\n        } else {\\n            break;\\n        }\\n    }\\n\\n    results\\n}', 'params': ['svg: &str'], 'args': ['svg: &str'], 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 3921, "label": "load_svg_walls", "group": "Function", "title": "{'name': 'load_svg_walls', 'file_path': '/home/stephenp/Documents/macroquad_proj/>/home/stephenp/Documents/coding/macroquad_proj/src/svg_loader.rs', 'line_number': 178, 'end_line': 181, 'source': 'pub fn load_svg_walls(path: &str) -> Result<Vec<Wall>, Box<dyn Error>> {\\n    let svg_text = fs::read_to_string(path)?;\\n    Ok(extract_paths(&svg_text))\\n}', 'params': ['path: &str'], 'args': ['path: &str'], 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 3923, "label": "load_svg_walls_with_transform", "group": "Function", "title": "{'name': 'load_svg_walls_with_transform', 'file_path': '/home/stephenp/Documents/macroquad_proj/>/home/stephenp/Documents/coding/macroquad_proj/src/svg_loader.rs', 'line_number': 183, 'end_line': 200, 'source': 'pub fn load_svg_walls_with_transform(\\n    path: &str,\\n    scale_x: f64,\\n    scale_y: f64,\\n    offset_x: f64,\\n    offset_y: f64,\\n) -> Result<Vec<Wall>, Box<dyn Error>> {\\n    let mut walls = load_svg_walls(path)?;\\n\\n    for wall in &mut walls {\\n        wall.a.x = wall.a.x * scale_x + offset_x;\\n        wall.a.y = wall.a.y * scale_y + offset_y;\\n        wall.b.x = wall.b.x * scale_x + offset_x;\\n        wall.b.y = wall.b.y * scale_y + offset_y;\\n    }\\n\\n    Ok(walls)\\n}', 'params': ['path: &str', 'scale_x: f64', 'scale_y: f64', 'offset_x: f64', 'offset_y: f64'], 'args': ['path: &str', 'scale_x: f64', 'scale_y: f64', 'offset_x: f64', 'offset_y: f64'], 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 3909, "label": "home", "group": "Directory", "title": "{'path': '/home/stephenp/Documents/macroquad_proj/>/home', 'name': 'home'}", "color": "#97c2fc"}, {"id": 3910, "label": "stephenp", "group": "Directory", "title": "{'path': '/home/stephenp/Documents/macroquad_proj/>/home/stephenp', 'name': 'stephenp'}", "color": "#97c2fc"}, {"id": 3911, "label": "Documents", "g e)\\n                .with_thread_ids(false)\\n                .with_line_number(true)\\n                .with_ansi(false),\\n        )\\n        .with(\\n            tracing_subscriber::filter::Targets::new()\\n                .with_target(\"opengp\", log_level)\\n                .with_default(tracing::Level::WARN),\\n        )\\n        .init();\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27511, "label": "Result", "group": "Module", "title": "{'name': 'Result', 'full_import_name': 'use crate::error::Result;'}", "color": "#97c2fc"}, {"id": 27512, "label": "run_migrations", "group": "Module", "title": "{'name': 'run_migrations', 'full_import_name': 'use opengp::infrastructure::database::{create_pool, run_migrations};'}", "color": "#97c2fc"}, {"id": 27513, "label": "SubscriberInitExt", "group": "Module", "title": "{'name': 'SubscriberInitExt', 'full_import_name': 'use tracing_subscriber::{layer::SubscriberExt, util::SubscriberInitExt};'}", "color": "#97c2fc"}, {"id": 27514, "label": "lib.rs", "group": "File", "title": "{'path': '/home/stephenp/Documents/opengp/src/lib.rs', 'name': 'lib.rs', 'relative_path': 'src/lib.rs', 'is_dependency': False}", "color": "#baffc9"}, {"id": 27516, "label": "app.rs", "group": "File", "title": "{'path': '/home/stephenp/Documents/opengp/src/app.rs', 'name': 'app.rs', 'relative_path': 'src/app.rs', 'is_dependency': False}", "color": "#baffc9"}, {"id": 27590, "label": "config.rs", "group": "File", "title": "{'path': '/home/stephenp/Documents/opengp/src/config.rs', 'name': 'config.rs', 'relative_path': 'src/config.rs', 'is_dependency': False}", "color": "#baffc9"}, {"id": 27598, "label": "error.rs", "group": "File", "title": "{'path': '/home/stephenp/Documents/opengp/src/error.rs', 'name': 'error.rs', 'relative_path': 'src/error.rs', 'is_dependency': False}", "color": "#baffc9"}, {"id": 27633, "label": "ui", "group": "Directory", "title": "{'path': '/home/stephenp/Documents/opengp/src/ui', 'name': 'ui'}", "color": "#97c esult::Result<Vec<Practitioner>, RepositoryError> {\\n                Ok(vec![\\n                    Practitioner {\\n                        id: Uuid::parse_str(\"a1b2c3d4-e5f6-4789-a1b2-c3d4e5f64789\")\\n                            .expect(\"valid UUID\"),\\n                        user_id: None,\\n                        first_name: \"Sarah\".to_string(),\\n                        middle_name: None,\\n                        last_name: \"Johnson\".to_string(),\\n                        title: \"Dr\".to_string(),\\n                        hpi_i: Some(\"8003610000000000\".to_string()),\\n                        ahpra_registration: Some(\"MED0001234567\".to_string()),\\n                        prescriber_number: Some(\"123456\".to_string()),\\n                        provider_number: \"123456A\".to_string(),\\n                        speciality: Some(\"General Practice\".to_string()),\\n                        qualifications: vec![\"MBBS\".to_string(), \"FRACGP\".to_string()],\\n                        phone: Some(\"02 9876 5432\".to_string()),\\n                        email: Some(\"s.johnson@clinic.com\".to_string()),\\n                        is_active: true,\\n                        created_at: Utc::now(),\\n                        updated_at: Utc::now(),\\n                    },\\n                    Practitioner {\\n                        id: Uuid::parse_str(\"b2c3d4e5-f6a7-89a1-b2c3-d4e5f6a789a1\")\\n                            .expect(\"valid UUID\"),\\n                        user_id: None,\\n                        first_name: \"Michael\".to_string(),\\n                        middle_name: Some(\"James\".to_string()),\\n                        last_name: \"Chen\".to_string(),\\n                        title: \"Dr\".to_string(),\\n                        hpi_i: Some(\"8003610000000001\".to_string()),\\n                        ahpra_registration: Some(\"MED0001234568\".to_string()),\\n                        prescriber_number: Some(\"234567\".to_string()),\\n                        provider_number: \"234567B\".to_string(),\\n                        speciality: Some(\"General Practice\".to_string()),\\n                        qualifications: vec![\"MBBS\".to_string(), \"FRACGP\".to_string()],\\n                        phone: Some(\"02 9876 5433\".to_string()),\\n                        email: Some(\"m.chen@clinic.com\".to_string()),\\n                        is_active: true,\\n                        created_at: Utc::now(),\\n                        updated_at: Utc::now(),\\n                    },\\n                ])\\n            }\\n            \\n            async fn find_by_id(&self, _id: Uuid) -> std::result::Result<Option<Practitioner>, RepositoryError> {\\n                Ok(None)\\n            }\\n        }\\n\\n        let practitioner_repository: Arc<dyn PractitionerRepository> = Arc::new(MockPractitionerRepository);\\n        let practitioner_service = Arc::new(PractitionerService::new(practitioner_repository));\\n        \\n        Ok(Self {\\n            config,\\n            db_pool,\\n            patient_service,\\n            appointment_service,\\n            practitioner_service,\\n            should_quit: false,\\n            active_screen: Screen::Patients,\\n            patient_component: None,\\n            patient_form_component: None,\\n            appointment_component: None,\\n            appointment_form_component: None,\\n            clinical_component: None,\\n            billing_component: None,\\n            action_tx,\\n            action_rx,\\n            showing_form: false,\\n        })\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27528, "label": "run", "group": "Function", "title": "{'name': 'run', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 177, 'end_line': 228, 'params': ['&mut self: self'], 'args': ['&mut self: self'], 'source': 'pub async fn run(&mut self) -> Result<()> {\\n        info!(\"Starting application main loop\");\\n        \\n        let mut tui = Tui::new()?;\\n        tui.enter()?;\\n        \\n        let event_handler = EventHandler::new();\\n        self.init_components().await?;\\n        \\n        loop {\\n            tui.draw(|f| self.render(f))?;\\n            \\n            let event = event_handler.next()?;\\n            debug!(\"Received event: {:?}\", event);\\n            \\n            let action = self.handle_global_events(&event);\\n            if action != Action::None {\\n                self.action_tx.send(action)?;\\n            }\\n            \\n            let component_action = if self.showing_form {\\n                if let Some(form) = self.patient_form_component.as_mut() {\\n                    form.handle_events(Some(event))\\n                } else if let Some(form) = self.appointment_form_component.as_mut() {\\n                    form.handle_events(Some(event))\\n                } else {\\n                    Action::None\\n                }\\n            } else {\\n                self.get_active_component_mut()\\n                    .map(|c| c.handle_events(Some(event)))\\n                    .unwrap_or(Action::None)\\n            };\\n            \\n            if component_action != Action::None {\\n                self.action_tx.send(component_action)?;\\n            }\\n            \\n            while let Ok(action) = self.action_rx.try_recv() {\\n                self.update(action).await?;\\n            }\\n            \\n            if self.should_quit {\\n                break;\\n            }\\n        }\\n        \\n        tui.exit()?;\\n        info!(\"Application shutdown complete\");\\n        \\n        Ok(())\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27591, "label": "from_env", "group": "Function", "title": "{'name': 'from_env', 'path': '/home/stephenp/Documents/opengp/src/config.rs', 'line_number': 31, 'end_line': 66, 'params': [], 'args': [], 'source': 'pub fn from_env() -> Result<Self, ConfigError> {\\n        let _ = dotenvy::dotenv();\\n\\n        let database_url =\\n            std::env::var(\"DATABASE_URL\").unwrap_or_else(|_| \"sqlite:opengp.db\".to_string());\\n\\n        let max_connections = std::env::var(\"DATABASE_MAX_CONNECTIONS\")\\n            .ok()\\n            .and_then(|s| s.parse().ok())\\n            .unwrap_or(10);\\n\\n        let min_connections = std::env::var(\"DATABASE_MIN_CONNECTIONS\")\\n            .ok()\\n            .and_then(|s| s.parse().ok())\\n            .unwrap_or(2);\\n\\n        Ok(Self {\\n            database: DatabaseConfig {\\n                url: database_url,\\n                max_connections,\\n                min_connections,\\n                connect_timeout_secs: 30,\\n                idle_timeout_secs: 600,\\n            },\\n            encryption_key: std::env::var(\"ENCRYPTION_KEY\")\\n                .map_err(|_| ConfigError::MissingEncryptionKey)?,\\n            session_timeout_secs: std::env::var(\"SESSION_TIMEOUT_SECS\")\\n                .ok()\\n                .and_then(|s| s.parse().ok())\\n                .unwrap_or(900),\\n            log_level: std::env::var(\"LOG_LEVEL\").unwrap_or_else(|_| \"info\".to_string()),\\n            data_dir: std::env::var(\"DATA_DIR\")\\n                .map(PathBuf::from)\\n                .unwrap_or_else(|_| PathBuf::from(\"./data\")),\\n        })\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27700, "label": "create_pool", "group": "Function", "title": "{'name': 'create_pool', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/database/mod.rs', 'line_number': 56, 'end_line': 80, 'params': ['config: &DatabaseConfig'], 'args': ['config: &DatabaseConfig'], 'source': 'pub async fn create_pool(config: &DatabaseConfig) -> Result<SqlitePool, sqlx::Error> {\\n    info!(\"Creating database connection pool\");\\n    info!(\"  Database URL: {}\", config.url);\\n    info!(\"  Max connections: {}\", config.max_connections);\\n    info!(\"  Min connections: {}\", config.min_connections);\\n\\n    // Parse connection options\\n    let connect_options = SqliteConnectOptions::from_str(&config.url)?\\n        .create_if_missing(true)\\n        .busy_timeout(Duration::from_secs(30));\\n\\n    // Create pool with configuration\\n    let pool = SqlitePoolOptions::new()\\n        .max_connections(config.max_connections)\\n        .min_connections(config.min_connections)\\n        .acquire_timeout(Duration::from_secs(config.connect_timeout_secs))\\n        .idle_timeout(Duration::from_secs(config.idle_timeout_secs))\\n        .test_before_acquire(true) // Verify connections before use\\n        .connect_with(connect_options)\\n        .await?;\\n\\n    info!(\"Database connection pool created successfully\");\\n\\n    Ok(pool)\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27702, "label": "run_migrations", "group": "Function", "title": "{'name': 'run_migrations', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/database/mod.rs', 'line_number': 90, 'end_line': 100, 'params': ['pool: &SqlitePool'], 'args': ['pool: &SqlitePool'], 'source': 'pub async fn run_migrations(pool: &SqlitePool) -> Result<(), sqlx::Error> {\\n    info!(\"Running database migrations\");\\n\\n    sqlx::migrate!(\"./migrations\")\\n        .run(pool)\\n        .await?;\\n\\n    info!(\"Database migrations completed successfully\");\\n\\n    Ok(())\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27510, "label": "level: &str", "group": "Parameter", "title": "{'name': 'level: &str', 'path': '/home/stephenp/Documents/opengp/src/main.rs', 'function_line_number': 30}", "color": "#97c2fc"}, {"id": 27666, "label": "init", "group": "Function", "title": "{'name': 'init', 'path': '/home/stephenp/Documents/opengp/src/components/mod.rs', 'line_number': 41, 'end_line': 43, 'params': ['&mut self: self'], 'args': ['&mut self: self'], 'source': 'async fn init(&mut self) -> crate::error::Result<()> {\\n        Ok(())\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27851, "label": "create", "group": "Function", "title": "{'name': 'create', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/database/repositories/patient.rs', 'line_number': 189, 'end_line': 269, 'params': ['&self: self', 'patient: Patient'], 'args': ['&self: self', 'patient: Patient'], 'source': 'async fn create(&self, patient: Patient) -> Result<Patient, RepositoryError> {\\n        let id_bytes = patient.id.as_bytes().to_vec();\\n        let gender_str = patient.gender.to_string();\\n        let dob = patient.date_of_birth;\\n        let medicare_expiry = patient.medicare_expiry;\\n        let created_at_str = patient.created_at.to_rfc3339();\\n        let updated_at_str = patient.updated_at.to_rfc3339();\\n        let medicare_irn_i64 = patient.medicare_irn.map(|i| i as i64);\\n        \\n        let emergency_contact_name = patient.emergency_contact.as_ref().map(|ec| ec.name.clone());\\n        let emergency_contact_phone = patient.emergency_contact.as_ref().map(|ec| ec.phone.clone());\\n        let emergency_contact_relationship = patient.emergency_contact.as_ref().map(|ec| ec.relationship.clone());\\n        \\n        let result = sqlx::query(\\n            r#\"\\n            INSERT INTO patients (\\n                id, ihi, medicare_number, medicare_irn, medicare_expiry,\\n                title, first_name, middle_name, last_name, preferred_name,\\n                date_of_birth, gender,\\n                address_line1, address_line2, suburb, state, postcode, country,\\n                phone_home, phone_mobile, email,\\n                emergency_contact_name, emergency_contact_phone, emergency_contact_relationship,\\n                is_active, is_deceased,\\n                created_at, updated_at\\n            ) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)\\n            \"#\\n        )\\n        .bind(id_bytes)\\n        .bind(&patient.ihi)\\n        .bind(&patient.medicare_number)\\n        .bind(medicare_irn_i64)\\n        .bind(medicare_expiry)\\n        .bind(&patient.title)\\n        .bind(&patient.first_name)\\n        .bind(&patient.middle_name)\\n        .bind(&patient.last_name)\\n        .bind(&patient.preferred_name)\\n        .bind(dob)\\n        .bind(gender_str)\\n        .bind(&patient.address.line1)\\n        .bind(&patient.address.line2)\\n        .bind(&patient.address.suburb)\\n        .bind(&patient.address.state)\\n        .bind(&patient.address.postcode)\\n        .bind(&patient.address.country)\\n        .bind(&patient.phone_home)\\n        .bind(&patient.phone_mobile)\\n        .bind(&patient.email)\\n        .bind(emergency_contact_name)\\n        .bind(emergency_contact_phone)\\n        .bind(emergency_contact_relationship)\\n        .bind(patient.is_active)\\n        .bind(patient.is_deceased)\\n        .bind(created_at_str)\\n        .bind(updated_at_str)\\n        .execute(&self.pool)\\n        .await;\\n        \\n        match result {\\n            Ok(_) => Ok(patient),\\n            Err(sqlx::Error::Database(db_err)) => {\\n                let err_msg = db_err.message();\\n                if err_msg.contains(\"UNIQUE constraint\") && err_msg.contains(\"medicare_number\") {\\n                    Err(RepositoryError::ConstraintViolation(\\n                        \"Medicare number already exists in the system\".to_string()\\n                    ))\\n                } else if err_msg.contains(\"NOT NULL constraint\") {\\n                    Err(RepositoryError::ConstraintViolation(\\n                        \"Required field is missing\".to_string()\\n                    ))\\n                } else if err_msg.contains(\"CHECK constraint\") {\\n                    Err(RepositoryError::ConstraintViolation(\\n                        \"Invalid value for field\".to_string()\\n                    ))\\n                } else {\\n                    Err(RepositoryError::Database(sqlx::Error::Database(db_err)))\\n                }\\n            }\\n            Err(e) => Err(RepositoryError::Database(e)),\\n        }\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27515, "label": "App", "group": "Module", "title": "{'name': 'App', 'full_import_name': 'pub use app::App;'}", "color": "#97c2fc"}, {"id": 27517, "label": "as_str", "group": "Function", "title": "{'name': 'as_str', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 40, 'end_line': 47, 'params': ['&self: self'], 'args': ['&self: self'], 'source': 'pub fn as_str(&self) -> &str {\\n        match self {\\n            Screen::Patients => \"Patients\",\\n            Screen::Appointments => \"Appointments\",\\n            Screen::Clinical => \"Clinical\",\\n            Screen::Billing => \"Billing\",\\n        }\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27519, "label": "all", "group": "Function", "title": "{'name': 'all', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 49, 'end_line': 56, 'params': [], 'args': [], 'source': 'pub fn all() -> Vec<Screen> {\\n        vec![\\n            Screen::Patients,\\n            Screen::Appointments,\\n            Screen::Clinical,\\n            Screen::Billing,\\n        ]\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27523, "label": "list_active", "group": "Function", "title": "{'name': 'list_active', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 103, 'end_line': 146, 'params': ['&self: self'], 'args': ['&self: self'], 'source': 'async fn list_active(&self) -> std::result::Result<Vec<Practitioner>, RepositoryError> {\\n                Ok(vec![\\n                    Practitioner {\\n                        id: Uuid::parse_str(\"a1b2c3d4-e5f6-4789-a1b2-c3d4e5f64789\")\\n                            .expect(\"valid UUID\"),\\n                        user_id: None,\\n                        first_name: \"Sarah\".to_string(),\\n                        middle_name: None,\\n                        last_name: \"Johnson\".to_string(),\\n                        title: \"Dr\".to_string(),\\n                        hpi_i: Some(\"8003610000000000\".to_string()),\\n                        ahpra_registration: Some(\"MED0001234567\".to_string()),\\n                        prescriber_number: Some(\"123456\".to_string()),\\n                        provider_number: \"123456A\".to_string(),\\n                        speciality: Some(\"General Practice\".to_string()),\\n                        qualifications: vec![\"MBBS\".to_string(), \"FRACGP\".to_string()],\\n                        phone: Some(\"02 9876 5432\".to_string()),\\n                        email: Some(\"s.johnson@clinic.com\".to_string()),\\n                        is_active: true,\\n                        created_at: Utc::now(),\\n                        updated_at: Utc::now(),\\n                    },\\n                    Practitioner {\\n                        id: Uuid::parse_str(\"b2c3d4e5-f6a7-89a1-b2c3-d4e5f6a789a1\")\\n                            .expect(\"valid UUID\"),\\n                        user_id: None,\\n                        first_name: \"Michael\".to_string(),\\n                        middle_name: Some(\"James\".to_string()),\\n                        last_name: \"Chen\".to_string(),\\n                        title: \"Dr\".to_string(),\\n                        hpi_i: Some(\"8003610000000001\".to_string()),\\n                        ahpra_registration: Some(\"MED0001234568\".to_string()),\\n                        prescriber_number: Some(\"234567\".to_string()),\\n                        provider_number: \"234567B\".to_string(),\\n                        speciality: Some(\"General Practice\".to_string()),\\n                        qualifications: vec![\"MBBS\".to_string(), \"FRACGP\".to_string()],\\n                        phone: Some(\"02 9876 5433\".to_string()),\\n                        email: Some(\"m.chen@clinic.com\".to_string()),\\n                        is_active: true,\\n                        created_at: Utc::now(),\\n                        updated_at: Utc::now(),\\n                    },\\n                ])\\n            }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27525, "label": "find_by_id", "group": "Function", "title": "{'name': 'find_by_id', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 148, 'end_line': 150, 'params': ['&self: self', '_id: Uuid'], 'args': ['&self: self', '_id: Uuid'], 'source': 'async fn find_by_id(&self, _id: Uuid) -> std::result::Result<Option<Practitioner>, RepositoryError> {\\n                Ok(None)\\n            }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27530, "label": "init_components", "group": "Function", "title": "{'name': 'init_components', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 231, 'end_line': 247, 'params': ['&mut self: self'], 'args': ['&mut self: self'], 'source': 'async fn init_components(&mut self) -> Result<()> {\\n        info!(\"Initializing components\");\\n        \\n        let mut patient_list = PatientListComponent::new(self.patient_service.clone());\\n        patient_list.init().await?;\\n        self.patient_component = Some(Box::new(patient_list));\\n        \\n        let mut appointment_calendar = AppointmentCalendarComponent::new(\\n            self.appointment_service.clone(),\\n            self.practitioner_service.clone(),\\n            self.patient_service.clone(),\\n        );\\n        appointment_calendar.init().await?;\\n        self.appointment_component = Some(Box::new(appointment_calendar));\\n        \\n        Ok(())\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27532, "label": "patient_service", "group": "Function", "title": "{'name': 'patient_service', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 250, 'end_line': 252, 'params': ['&self: self'], 'args': ['&self: self'], 'source': 'pub fn patient_service(&self) -> Arc<PatientService> {\\n        self.patient_service.clone()\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27534, "label": "handle_global_events", "group": "Function", "title": "{'name': 'handle_global_events', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 255, 'end_line': 282, 'params': ['&self: self', 'event: &crate::ui::event::Event'], 'args': ['&self: self', 'event: &crate::ui::event::Event'], 'source': \"fn handle_global_events(&self, event: &crate::ui::event::Event) -> Action {\\n        use crate::ui::event::Event;\\n        \\n        match event {\\n            Event::Key(key) => {\\n                if (key.modifiers.contains(KeyModifiers::CONTROL) && key.code == KeyCode::Char('c'))\\n                    || key.code == KeyCode::Char('q')\\n                {\\n                    return Action::Quit;\\n                }\\n                \\n                if self.showing_form {\\n                    return Action::None;\\n                }\\n                \\n                match key.code {\\n                    KeyCode::Char('1') => Action::NavigateToPatients,\\n                    KeyCode::Char('2') => Action::NavigateToAppointments,\\n                    KeyCode::Char('3') => Action::NavigateToClinical,\\n                    KeyCode::Char('4') => Action::NavigateToBilling,\\n                    KeyCode::Tab => self.next_screen(),\\n                    KeyCode::BackTab => self.prev_screen(),\\n                    _ => Action::None,\\n                }\\n            }\\n            _ => Action::None,\\n        }\\n    }\", 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27537, "label": "next_screen", "group": "Function", "title": "{'name': 'next_screen', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 285, 'end_line': 292, 'params': ['&self: self'], 'args': ['&self: self'], 'source': 'fn next_screen(&self) -> Action {\\n        match self.active_screen {\\n            Screen::Patients => Action::NavigateToAppointments,\\n            Screen::Appointments => Action::NavigateToClinical,\\n            Screen::Clinical => Action::NavigateToBilling,\\n            Screen::Billing => Action::NavigateToPatients,\\n        }\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27539, "label": "prev_screen", "group": "Function", "title": "{'name': 'prev_screen', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 295, 'end_line': 302, 'params': ['&self: self'], 'args': ['&self: self'], 'source': 'fn prev_screen(&self) -> Action {\\n        match self.active_screen {\\n            Screen::Patients => Action::NavigateToBilling,\\n            Screen::Appointments => Action::NavigateToPatients,\\n            Screen::Clinical => Action::NavigateToAppointments,\\n            Screen::Billing => Action::NavigateToClinical,\\n        }\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27541, "label": "update", "group": "Function", "title": "{'name': 'update', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 305, 'end_line': 396, 'params': ['&mut self: self', 'action: Action'], 'args': ['&mut self: self', 'action: Action'], 'source': 'async fn update(&mut self, action: Action) -> Result<()> {\\n        debug!(\"Processing action: {:?}\", action);\\n        \\n        match action {\\n            Action::Quit => {\\n                info!(\"Quit action received\");\\n                self.should_quit = true;\\n            }\\n            Action::NavigateToPatients => {\\n                info!(\"Navigating to Patients\");\\n                self.active_screen = Screen::Patients;\\n                self.showing_form = false;\\n            }\\n            Action::NavigateToAppointments => {\\n                info!(\"Navigating to Appointments\");\\n                self.active_screen = Screen::Appointments;\\n                self.showing_form = false;\\n            }\\n            Action::NavigateToClinical => {\\n                info!(\"Navigating to Clinical\");\\n                self.active_screen = Screen::Clinical;\\n                self.showing_form = false;\\n            }\\n            Action::NavigateToBilling => {\\n                info!(\"Navigating to Billing\");\\n                self.active_screen = Screen::Billing;\\n                self.showing_form = false;\\n            }\\n            Action::PatientCreate => {\\n                info!(\"Opening patient creation form\");\\n                let mut form = PatientFormComponent::new(self.patient_service.clone());\\n                form.init().await?;\\n                self.patient_form_component = Some(Box::new(form));\\n                self.showing_form = true;\\n            }\\n            Action::AppointmentCreate => {\\n                info!(\"Opening appointment creation form\");\\n                let mut form = AppointmentFormComponent::new(\\n                    self.appointment_service.clone(),\\n                    self.patient_service.clone(),\\n                );\\n                form.init().await?;\\n                self.appointment_form_component = Some(Box::new(form));\\n                self.showing_form = true;\\n            }\\n            Action::PatientFormCancel => {\\n                info!(\"Patient form cancelled\");\\n                self.showing_form = false;\\n                self.patient_form_component = None;\\n            }\\n            Action::AppointmentFormCancel => {\\n                info!(\"Appointment form cancelled\");\\n                self.showing_form = false;\\n                self.appointment_form_component = None;\\n            }\\n            _ => {\\n                let component = if self.showing_form {\\n                    if let Some(form) = self.patient_form_component.as_mut() {\\n                        Some(form)\\n                    } else {\\n                        self.appointment_form_component.as_mut()\\n                    }\\n                } else {\\n                    self.get_active_component_mut()\\n                };\\n                \\n                if let Some(comp) = component {\\n                    if let Some(new_action) = comp.update(action).await? {\\n                        if new_action == Action::PatientFormSubmit {\\n                            info!(\"Patient form submitted successfully\");\\n                            self.showing_form = false;\\n                            self.patient_form_component = None;\\n                            if let Some(list_component) = &mut self.patient_component {\\n                                list_component.init().await?;\\n                            }\\n                        } else if new_action == Action::AppointmentFormSubmit {\\n                            info!(\"Appointment form submitted successfully\");\\n                            self.showing_form = false;\\n                            self.appointment_form_component = None;\\n                            if let Some(list_component) = &mut self.appointment_component {\\n                                list_component.init().await?;\\n                            }\\n                        } else {\\n                            self.action_tx.send(new_action)?;\\n                        }\\n                    }\\n                }\\n            }\\n        }\\n        \\n        Ok(())\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27544, "label": "render", "group": "Function", "title": "{'name': 'render', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 399, 'end_line': 412, 'params': ['&mut self: self', 'frame: &mut Frame'], 'args': ['&mut self: self', 'frame: &mut Frame'], 'source': 'fn render(&mut self, frame: &mut Frame) {\\n        let size = frame.area();\\n        \\n        let chunks = Layout::default()\\n            .direction(Direction::Vertical)\\n            .constraints([\\n                Constraint::Length(3),\\n                Constraint::Min(0),\\n            ])\\n            .split(size);\\n        \\n        self.render_header(frame, chunks[0]);\\n        self.render_content(frame, chunks[1]);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27547, "label": "render_header", "group": "Function", "title": "{'name': 'render_header', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 415, 'end_line': 437, 'params': ['&self: self', 'frame: &mut Frame', 'area: Rect'], 'args': ['&self: self', 'frame: &mut Frame', 'area: Rect'], 'source': 'fn render_header(&self, frame: &mut Frame, area: Rect) {\\n        let screens = Screen::all();\\n        let titles: Vec<&str> = screens.iter().map(|s| s.as_str()).collect();\\n        \\n        let selected = match self.active_screen {\\n            Screen::Patients => 0,\\n            Screen::Appointments => 1,\\n            Screen::Clinical => 2,\\n            Screen::Billing => 3,\\n        };\\n        \\n        let tabs = Tabs::new(titles)\\n            .block(Block::default().borders(Borders::ALL).title(\"OpenGP\"))\\n            .select(selected)\\n            .style(Style::default().fg(Color::White))\\n            .highlight_style(\\n                Style::default()\\n                    .fg(Color::Yellow)\\n                    .add_modifier(Modifier::BOLD),\\n            );\\n        \\n        frame.render_widget(tabs, area);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27551, "label": "render_content", "group": "Function", "title": "{'name': 'render_content', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 440, 'end_line': 452, 'params': ['&mut self: self', 'frame: &mut Frame', 'area: Rect'], 'args': ['&mut self: self', 'frame: &mut Frame', 'area: Rect'], 'source': 'fn render_content(&mut self, frame: &mut Frame, area: Rect) {\\n        if self.showing_form {\\n            if let Some(form) = &mut self.patient_form_component {\\n                form.render(frame, area);\\n            } else if let Some(form) = &mut self.appointment_form_component {\\n                form.render(frame, area);\\n            }\\n        } else if let Some(component) = self.get_active_component_mut() {\\n            component.render(frame, area);\\n        } else {\\n            self.render_placeholder(frame, area);\\n        }\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27555, "label": "render_placeholder", "group": "Function", "title": "{'name': 'render_placeholder', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 455, 'end_line': 475, 'params': ['&self: self', 'frame: &mut Frame', 'area: Rect'], 'args': ['&self: self', 'frame: &mut Frame', 'area: Rect'], 'source': 'fn render_placeholder(&self, frame: &mut Frame, area: Rect) {\\n        let text = format!(\\n            \"{} Screen\\\\n\\\\n\\\\\\n            Component not yet implemented\\\\n\\\\n\\\\\\n            Controls:\\\\n\\\\\\n              1-4: Switch screens\\\\n\\\\\\n              Tab/Shift+Tab: Navigate screens\\\\n\\\\\\n              q or Ctrl+C: Quit\",\\n            self.active_screen.as_str()\\n        );\\n        \\n        let paragraph = Paragraph::new(text)\\n            .block(\\n                Block::default()\\n                    .borders(Borders::ALL)\\n                    .title(format!(\" {} \", self.active_screen.as_str())),\\n            )\\n            .style(Style::default().fg(Color::White));\\n        \\n        frame.render_widget(paragraph, area);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27559, "label": "get_active_component_mut", "group": "Function", "title": "{'name': 'get_active_component_mut', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 478, 'end_line': 485, 'params': ['&mut self: self'], 'args': ['&mut self: self'], 'source': 'fn get_active_component_mut(&mut self) -> Option<&mut Box<dyn Compon le": "{'name': 'all', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 58, 'end_line': 65, 'params': [], 'args': [], 'source': 'pub fn all() -> Vec<Screen> {\\n        vec![\\n            Screen::Patients,\\n            Screen::Appointments,\\n            Screen::Clinical,\\n            Screen::Billing,\\n        ]\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28646, "label": "new", "group": "Function", "title": "{'name': 'new', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 95, 'end_line': 180, 'params': ['config: Config', 'db_pool: SqlitePool'], 'args': ['config: Config', 'db_pool: SqlitePool'], 'source': 'pub fn new(config: Config, db_pool: SqlitePool) -> Result<Self> {\\n        info!(\"Initializing application\");\\n\\n        let (action_tx, action_rx) = mpsc::unbounded_channel();\\n\\n        let crypto = Arc::new(EncryptionService::new()?);\\n\\n        let patient_repository: Arc<dyn PatientRepository> =\\n            Arc::new(SqlxPatientRepository::new(db_pool.clone(), crypto.clone()));\\n        let patient_service = Arc::new(PatientService::new(patient_repository));\\n\\n        let audit_repository: Arc<dyn AuditRepository> =\\n            Arc::new(SqlxAuditRepository::new(db_pool.clone()));\\n        let audit_service = Arc::new(AuditService::new(audit_repository));\\n\\n        let appointment_repo = Arc::new(SqlxAppointmentRepository::new(db_pool.clone()));\\n        let appointment_repository: Arc<dyn AppointmentRepository> = appointment_repo.clone();\\n        let appointment_calendar_query: Arc<dyn AppointmentCalendarQuery> = appointment_repo;\\n        let appointment_service = Arc::new(AppointmentService::new(\\n            appointment_repository,\\n            audit_service.clone(),\\n            appointment_calendar_query,\\n        ));\\n\\n        // Use real SqlxPractitionerRepository backed by users table\\n        let practitioner_repository: Arc<dyn PractitionerRepository> =\\n            Arc::new(SqlxPractitionerRepository::new(db_pool.clone()));\\n        let practitioner_service = Arc::new(PractitionerService::new(practitioner_repository));\\n\\n        // Initialize clinical repositories and service\\n        let consultation_repo: Arc<dyn crate::domain::clinical::ConsultationRepository> =\\n            Arc::new(SqlxClinicalRepository::new(db_pool.clone(), crypto.clone()));\\n        let allergy_repo: Arc<dyn crate::domain::clinical::AllergyRepository> =\\n            Arc::new(SqlxAllergyRepository::new(db_pool.clone(), crypto.clone()));\\n        let medical_history_repo: Arc<dyn crate::domain::clinical::MedicalHistoryRepository> =\\n            Arc::new(SqlxMedicalHistoryRepository::new(\\n                db_pool.clone(),\\n                crypto.clone(),\\n            ));\\n        let vital_signs_repo: Arc<dyn crate::domain::clinical::VitalSignsRepository> = Arc::new(\\n            SqlxVitalSignsRepository::new(db_pool.clone(), crypto.clone()),\\n        );\\n        let social_history_repo: Arc<dyn crate::domain::clinical::SocialHistoryRepository> =\\n            Arc::new(SqlxSocialHistoryRepository::new(\\n                db_pool.clone(),\\n                crypto.clone(),\\n            ));\\n        let family_history_repo: Arc<dyn crate::domain::clinical::FamilyHistoryRepository> =\\n            Arc::new(SqlxFamilyHistoryRepository::new(\\n                db_pool.clone(),\\n                crypto.clone(),\\n            ));\\n\\n        let clinical_service = Arc::new(ClinicalService::new(\\n            consultation_repo,\\n            allergy_repo,\\n            medical_history_repo,\\n            vital_signs_repo,\\n            social_history_repo,\\n            family_history_repo,\\n            patient_service.clone(),\\n            audit_service,\\n            crypto,\\n        ));\\n\\n        Ok(Self {\\n            config,\\n            db_pool,\\n            patient_service,\\n            appointment_service,\\n            practitioner_service,\\n            clinical_service,\\n            should_quit: false,\\n            active_screen: Screen::Patients,\\n            patient_component: None,\\n            patient_form_component: None,\\n            appointment_component: None,\\n            appointment_form_component: None,\\n            clinical_component: None,\\n            billing_component: None,\\n            action_tx,\\n            action_rx,\\n            showing_form: false,\\n            tabs_area: None,\\n        })\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28649, "label": "run", "group": "Function", "title": "{'name': 'run', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 183, 'end_line': 236, 'params': ['&mut self: self'], 'args': ['&mut self: self'], 'source': 'pub async fn run(&mut self) -> Result<()> {\\n        info!(\"Starting application main loop\");\\n\\n        let mut tui = Tui::new()?;\\n        tui.enter()?;\\n\\n        let event_handler = EventHandler::new();\\n        self.init_components().await?;\\n\\n        loop {\\n            tui.draw(|f| self.render(f))?;\\n\\n            let event = event_handler.next()?;\\n            debug!(\"Received event: {:?}\", event);\\n\\n            let action = self.handle_global_events(&event);\\n            if action != Action::None {\\n                self.action_tx.send(action)?;\\n            }\\n\\n            let component_action = if self.showing_form {\\n                if let Some(form) = self.patient_form_component.as_mut() {\\n                    form.handle_events(Some(event))\\n                } else if let Some(form) = self.appointment_form_component.as_mut() {\\n                    form.handle_events(Some(event))\\n                } else {\\n                    Action::None\\n                }\\n            } else {\\n                self.get_active_component_mut()\\n                    .map(|c| c.handle_events(Some(event)))\\n                    .unwrap_or(Action::None)\\n            };\\n\\n            if component_action != Action::None {\\n                self.action_tx.send(component_action)?;\\n            }\\n\\n            while let Ok(action) = self.action_rx.try_recv() {\\n                if let Some(new_action) = self.update(action).await? {\\n                    self.action_tx.send(new_action)?;\\n                }\\n            }\\n\\n            if self.should_quit {\\n                break;\\n            }\\n        }\\n\\n        tui.exit()?;\\n        info!(\"Application shutdown complete\");\\n\\n        Ok(())\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28651, "label": "init_components", "group": "Function", "title": "{'name': 'init_components', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 239, 'end_line': 260, 'params': ['&mut self: self'], 'args': ['&mut self: self'], 'source': 'async fn init_components(&mut self) -> Result<()> {\\n        info!(\"Initializing components\");\\n\\n        let mut patient_list = PatientListComponent::new(self.patient_service.clone());\\n        patient_list.init().await?;\\n        self.patient_component = Some(Box::new(patient_list));\\n\\n        let mut appointment_calendar = AppointmentCalendarComponent::new(\\n            self.appointment_service.clone(),\\n            self.practitioner_service.clone(),\\n            self.patient_service.clone(),\\n        );\\n        appointment_calendar.init().await?;\\n        self.appointment_component = Some(Box::new(appointment_calendar));\\n\\n        let mut clinical =\\n            ClinicalComponent::new(self.clinical_service.clone(), self.patient_service.clone());\\n        clinical.init().await?;\\n        self.clinical_component = Some(Box::new(clinical));\\n\\n        Ok(())\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28653, "label": "patient_service", "group": "Function", "title": "{'name': 'patient_service', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 263, 'end_line': 265, 'params': ['&self: self'], 'args': ['&self: self'], 'source': 'pub fn patient_service(&self) -> Arc<PatientService> {\\n        self.patient_service.clone()\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28655, "label": "handle_global_events", "group": "Function", "title": "{'name': 'handle_global_events', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 268, 'end_line': 338, 'params': ['&mut self: self', 'event: &crate::ui::event::Event'], 'args': ['&mut self: self', 'event: &crate::ui::event::Event'], 'source': 'fn handle_global_events(&mut self, event: &crate::ui::event::Event) -> Action {\\n        use crate::ui::event::Event;\\n\\n        match event {\\n            Event::Key(key) => {\\n                if (key.modifiers.contains(KeyModifiers::CONTROL) && key.code == KeyCode::Char(\\'c\\'))\\n                    || key.code == KeyCode::Char(\\'q\\')\\n                {\\n                    return Action::Quit;\\n                }\\n\\n                if self.showing_form {\\n                    return Action::None;\\n                }\\n\\n                match key.code {\\n                    KeyCode::Char(\\'1\\') => Action::NavigateToPatients,\\n                    KeyCode::Char(\\'2\\') => Action::NavigateToAppointments,\\n                    KeyCode::Char(\\'3\\') => Action::NavigateToClinical,\\n                    KeyCode::Char(\\'4\\') => Action::NavigateToBilling,\\n                    _ => Action::None,\\n                }\\n            }\\n            Event::Mouse(mouse) => {\\n                if !is_click(mouse) {\\n                    return Action::None;\\n                }\\n\\n                if self.showing_form {\\n                    return Action::None;\\n                }\\n\\n                if let Some(tabs_area) = self.tabs_area {\\n                    let col = mouse.column;\\n                    let row = mouse.row;\\n\\n                    if col >= tabs_area.x\\n                        && col < tabs_area.x + tabs_area.width\\n                        && row >= tabs_area.y\\n                        && row < tabs_area.y + tabs_area.height\\n                    {\\n                        let titles = [\"Patients\", \"Appointments\", \"Clinical\", \"Billing\"];\\n                        let block_padding = 1;\\n                        let inner_x = tabs_area.x + block_padding;\\n                        let inner_width = tabs_area.width.saturating_sub(2 * block_padding);\\n\\n                        let mut cumulative = 0;\\n                        for (i, title) in titles.iter().enumerate() {\\n                            let title_len = title.len() as u16;\\n                            let tab_start = inner_x + (cumulative * inner_width / 35);\\n                            let tab_end =\\n                                inner_x + ((cumulative + title_len) * inner_width / 35) + 2;\\n\\n                            if col >= tab_start && col < tab_end {\\n                                return match i {\\n                                    0 => Action::NavigateToPatients,\\n                                    1 => Action::NavigateToAppointments,\\n                                    2 => Action::NavigateToClinical,\\n                                    3 => Action::NavigateToBilling,\\n                                    _ => Action::None,\\n                                };\\n                            }\\n                            cumulative += title_len + 2;\\n                        }\\n                    }\\n                }\\n                Action::None\\n            }\\n            _ => Action::None,\\n        }\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28658, "label": "update", "group": "Function", "title": "{'name': 'update', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 341, 'end_line': 456, 'params': ['&mut self: self', 'action: Action'], 'args': ['&mut self: self', 'action: Action'], 'source': 'async fn update(&mut self, action: Action) -> Result<Option<Action>> {\\n        debug!(\"Processing action: {:?}\", action);\\n\\n        match action {\\n            Action::Quit => {\\n                info!(\"Quit action received\");\\n                self.should_quit = true;\\n            }\\n            Action::NavigateToPatients => {\\n                info!(\"Navigating to Patients\");\\n                self.active_screen = Screen::Patients;\\n                self.showing_form = false;\\n            }\\n            Action::NavigateToAppointments => {\\n                info!(\"Navigating to Appointments\");\\n                self.active_screen = Screen::Appointments;\\n                self.showing_form = false;\\n            }\\n            Action::NavigateToClinical => {\\n                info!(\"Navigating to Clinical\");\\n                self.active_screen = Screen::Clinical;\\n                self.showing_form = false;\\n            }\\n            Action::NavigateToClinicalWithPatient(patient_id) => {\\n                info!(\"Navigating to Clinical with patient: {}\", patient_id);\\n                self.active_screen = Screen::Clinical;\\n                self.showing_form = false;\\n                return Ok(Some(Action::ClinicalPatientSelect(patient_id)));\\n            }\\n            Action::NavigateToBilling => {\\n                info!(\"Navigating to Billing\");\\n                self.active_screen = Screen::Billing;\\n                self.showing_form = false;\\n            }\\n            Action::PatientCreate => {\\n                info!(\"Opening patient creation form\");\\n                let mut form = PatientFormComponent::new(self.patient_service.clone());\\n                form.init().await?;\\n                self.patient_form_component = Some(Box::new(form));\\n                self.showing_form = true;\\n            }\\n            Action::PatientEdit(patient_id) => {\\n                info!(\"Opening patient edit form for ID: {}\", patient_id);\\n                match self.patient_service.find_patient(patient_id).await {\\n                    Ok(Some(patient)) => {\\n                        let form =\\n                            PatientFormComponent::edit(self.patient_service.clone(), patient);\\n                        self.patient_form_component = Some(Box::new(form));\\n                        self.showing_form = true;\\n                    }\\n                    Ok(None) => {\\n                        info!(\"Patient not found: {}\", patient_id);\\n                    }\\n                    Err(e) => {\\n                        info!(\"Error loading patient: {}\", e);\\n                    }\\n                }\\n            }\\n            Action::AppointmentCreate => {\\n                info!(\"Opening appointment creation form\");\\n                let mut form = AppointmentFormComponent::new(\\n                    self.appointment_service.clone(),\\n                    self.patient_service.clone(),\\n                    self.practitioner_service.clone(),\\n                );\\n                form.init().await?;\\n                self.appointment_form_component = Some(Box::new(form));\\n                self.showing_form = true;\\n            }\\n            Action::PatientFormCancel => {\\n                info!(\"Patient form cancelled\");\\n                self.showing_form = false;\\n                self.patient_form_component = None;\\n            }\\n            Action::AppointmentFormCancel => {\\n                info!(\"Appointment form cancelled\");\\n                self.showing_form = false;\\n                self.appointment_form_component = None;\\n            }\\n            _ => {\\n                let component = if self.showing_form {\\n                    if let Some(form) = self.patient_form_component.as_mut() {\\n                        Some(form)\\n                    } else {\\n                        self.appointment_form_component.as_mut()\\n                    }\\n                } else {\\n                    self.get_active_component_mut()\\n                };\\n\\n                if let Some(comp) = component {\\n                    if let Some(new_action) = comp.update(action).await? {\\n                        if new_action == Action::PatientFormSubmit {\\n                            info!(\"Patient form submitted successfully\");\\n                            self.showing_form = false;\\n                            self.patient_form_component = None;\\n                            if let Some(list_component) = &mut self.patient_component {\\n                                list_component.init().await?;\\n                            }\\n                        } else if new_action == Action::AppointmentFormSubmit {\\n                            info!(\"Appointment form submitted successfully\");\\n                            self.showing_form = false;\\n                            self.appointment_form_component = None;\\n                            if let Some(list_component) = &mut self.appointment_component {\\n                                list_component.init().await?;\\n                            }\\n                        } else {\\n                            self.action_tx.send(new_action)?;\\n                        }\\n                    }\\n                }\\n            }\\n        }\\n\\n        Ok(None)\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28661, "label": "render", "group": "Function", "title": "{'name': 'render', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 459, 'end_line': 469, 'params': ['&mut self: self', 'frame: &mut Frame'], 'args': ['&mut self: self', 'frame: &mut Frame'], 'source': 'fn render(&mut self, frame: &mut Frame) {\\n        let size = frame.area();\\n\\n        let chunks = Layout::default()\\n            .direction(Direction::Vertical)\\n            .constraints([Constraint::Length(3), Constraint::Min(0)])\\n            .split(size);\\n\\n        self.render_header(frame, chunks[0]);\\n        self.render_content(frame, chunks[1]);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28664, "label": "render_header", "group": "Function", "title": "{'name': 'render_header', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 472, 'end_line': 496, 'params': ['&mut self: self', 'frame: &mut Frame', 'area: Rect'], 'args': ['&mut self: self', 'frame: &mut Frame', 'area: Rect'], 'source': 'fn render_header(&mut self, frame: &mut Frame, area: Rect) {\\n        self.tabs_area = Some(area);\\n\\n        let screens = Screen::all();\\n        let titles: Vec<&str> = screens.iter().map(|s| s.as_str()).collect();\\n\\n        let selected = match self.active_screen {\\n            Screen::Patients => 0,\\n            Screen::Appointments => 1,\\n            Screen::Clinical => 2,\\n            Screen::Billing => 3,\\n        };\\n\\n        let tabs = Tabs::new(titles)\\n            .block(Block::default().borders(Borders::ALL).title(\"OpenGP\"))\\n            .select(selected)\\n            .style(Style::default().fg(Color::White))\\n            .highlight_style(\\n                Style::default()\\n                    .fg(Color::Yellow)\\n                    .add_modifier(Modifier::BOLD),\\n            );\\n\\n        frame.render_widget(tabs, area);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28668, "label": "render_content", "group": "Function", "title": "{'name': 'render_content', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 499, 'end_line': 511, 'params': ['&mut self: self', 'frame: &mut Frame', 'area: Rect'], 'args': ['&mut self: self', 'frame: &mut Frame', 'area: Rect'], 'source': 'fn render_content(&mut self, frame: &mut Frame, area: Rect) {\\n        if self.showing_form {\\n            if let Some(form) = &mut self.patient_form_component {\\n                form.render(frame, area);\\n            } else if let Some(form) = &mut self.appointment_form_component {\\n                form.render(frame, area);\\n            }\\n        } else if let Some(component) = self.get_active_component_mut() {\\n            component.render(frame, area);\\n        } else {\\n            self.render_placeholder(frame, area);\\n        }\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28672, "label": "render_placeholder", "group": "Function", "title": "{'name': 'render_placeholder', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 514, 'end_line': 533, 'params': ['&self: self', 'frame: &mut Frame', 'area: Rect'], 'args': ['&self: self', 'frame: &mut Frame', 'area: Rect'], 'source': 'fn render_placeholder(&self, frame: &mut Frame, area: Rect) {\\n        let text = format!(\\n            \"{} Screen\\\\n\\\\n\\\\\\n            Component not yet implemented\\\\n\\\\n\\\\\\n            Controls:\\\\n\\\\\\n              1-4: Switch screens\\\\n\\\\\\n              q or Ctrl+C: Quit\",\\n            self.active_screen.as_str()\\n        );\\n\\n        let paragraph = Paragraph::new(text)\\n            .block(\\n                Block::default()\\n                    .borders(Borders::ALL)\\n                    .title(format!(\" {} \", self.active_screen.as_str())),\\n            )\\n            .style(Style::default().fg(Color::White));\\n\\n        frame.render_widget(paragraph, area);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28676, "label": "get_active_component_mut", "group": "Function", "title": "{'name': 'get_active_component_mut', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 536, 'end_line': 543, 'params': ['&mut self: self'], 'args': ['&mut self: self'], 'source': 'fn get_active_component_mut(&mut self) -> Option<&mut Box<dyn Component>> {\\n        match self.active_screen {\\n            Screen::Patients => self.patient_component.as_mut(),\\n            Screen::Appointments => self.appointment_component.as_mut(),\\n            Screen::Clinical => self.clinical_component.as_mut(),\\n            Screen::Billing => self.billing_component.as_mut(),\\n        }\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28678, "label": "quit", "group": "Function", "title": "{'name': 'quit', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 546, 'end_line': 548, 'params': ['&mut self: self'], 'args': ['&mut self: self'], 'source': 'pub fn quit(&mut self) {\\n        self.should_quit = true;\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28680, "label": "db_pool", "group": "Function", "title": "{'name': 'db_pool', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 551, 'end_line': 553, 'params': ['&self: self'], 'args': ['&self: self'], 'source': 'pub fn db_pool(&self) -> &SqlitePool {\\n        &self.db_pool\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28682, "label": "Screen", "group": "Class", "title": "{'name': 'Screen', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 41, 'end_line': 46, 'bases': [], 'source': 'pub enum Screen {\\n    Patients,\\n    Appointments,\\n    Clinical,\\n    Billing,\\n}'}", "color": "#bae1ff"}, {"id": 28683, "label": "App", "group": "Class", "title": "{'name': 'App', 'path': '/home/stephenp/Documents/opengp/src/app.rs', 'line_number': 71, 'end_line': 91, 'bases': [], 'source': 'pub struct App {\\n    #[allow(dead_code)]\\n    config: Config,\\n    db_pool: SqlitePool,\\n    patient_service: Arc<PatientService>,\\n    appointment_service: Arc<AppointmentService>,\\n    practitioner_service: Arc<crate::domain::user::PractitionerService>,\\n    clinical_service: Arc<ClinicalService>,\\n    should_quit: bool,\\n    active_screen: Screen,\\n    patient_component: Option<Box<dyn Component>>,\\n    patient_form_component: Option<Box<dyn Component>>,\\n    appoin one,\\n        concession_type: None,\\n        concession_number: None,\\n        preferred_language: None,\\n        interpreter_required: None,\\n        aboriginal_torres_strait_islander: None,\\n    };\\n\\n    let result = service.register_patient(data).await;\\n\\n    assert!(result.is_ok(), \"Failed to create patient: {:?}\", result.err());\\n\\n    let patient = result.unwrap();\\n    assert_eq!(patient.first_name, \"Test\");\\n    assert_eq!(patient.last_name, \"Patient\");\\n    assert_eq!(patient.medicare_number, Some(medicare_number));\\n    assert!(patient.is_active);\\n    assert!(!patient.is_deceased);\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27610, "label": "test_duplicate_medicare_number", "group": "Function", "title": "{'name': 'test_duplicate_medicare_number', 'path': '/home/stephenp/Documents/opengp/tests/patient_creation_test.rs', 'line_number': 61, 'end_line': 100, 'params': [], 'args': [], 'source': 'async fn test_duplicate_medicare_number() {\\n    let pool = SqlitePool::connect(\"sqlite:opengp.db\")\\n        .await\\n        .expect(\"Failed to connect to database\");\\n\\n    let repository: Arc<dyn PatientRepository> = Arc::new(SqlxPatientRepository::new(pool));\\n    let service = PatientService::new(repository);\\n\\n    let unique_medicare = generate_unique_medicare();\\n    \\n    let data = NewPatientData {\\n        ihi: None,\\n        medicare_number: Some(unique_medicare),\\n        medicare_irn: Some(1),\\n        medicare_expiry: None,\\n        title: Some(\"Ms\".to_string()),\\n        first_name: \"Duplicate\".to_string(),\\n        middle_name: None,\\n        last_name: \"Test\".to_string(),\\n        preferred_name: None,\\n        date_of_birth: NaiveDate::from_ymd_opt(1985, 6, 15).unwrap(),\\n        gender: Gender::Female,\\n        address: Address::default(),\\n        phone_home: None,\\n        phone_mobile: Some(\"0423456789\".to_string()),\\n        email: None,\\n        emergency_contact: None,\\n        concession_type: None,\\n        concession_number: None,\\n        preferred_language: None,\\n        interpreter_required: None,\\n        aboriginal_torres_strait_islander: None,\\n    };\\n\\n    let first_result = service.register_patient(data.clone()).await;\\n    assert!(first_result.is_ok());\\n\\n    let second_result = service.register_patient(data).await;\\n    assert!(second_result.is_err(), \"Should fail with duplicate Medicare number\");\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27611, "label": "test_find_patient_by_id", "group": "Function", "title": "{'name': 'test_find_patient_by_id', 'path': '/home/stephenp/Documents/opengp/tests/patient_creation_test.rs', 'line_number': 103, 'end_line': 145, 'params': [], 'args': [], 'source': 'async fn test_find_patient_by_id() {\\n    let pool = SqlitePool::connect(\"sqlite:opengp.db\")\\n        .await\\n        .expect(\"Failed to connect to database\");\\n\\n    let repository: Arc<dyn PatientRepository> = Arc::new(SqlxPatientRepository::new(pool));\\n    let service = PatientService::new(repository.clone());\\n\\n    let data = NewPatientData {\\n        ihi: None,\\n        medicare_number: Some(generate_unique_medicare()),\\n        medicare_irn: Some(2),\\n        medicare_expiry: None,\\n        title: None,\\n        first_name: \"FindMe\".to_string(),\\n        middle_name: None,\\n        last_name: \"Test\".to_string(),\\n        preferred_name: None,\\n        date_of_birth: NaiveDate::from_ymd_opt(2000, 12, 25).unwrap(),\\n        gender: Gender::Other,\\n        address: Address::default(),\\n        phone_home: None,\\n        phone_mobile: None,\\n        email: None,\\n        emergency_contact: None,\\n        concession_type: None,\\n        concession_number: None,\\n        preferred_language: None,\\n        interpreter_required: None,\\n        aboriginal_torres_strait_islander: None,\\n    };\\n\\n    let created = service.register_patient(data).aw unt);\\n    println!();\\n    \\n    if error_count == 0 {\\n        println!(\"\u2713 Database successfully cleared and seeded!\");\\n    } else {\\n        println!(\"\u26a0  Completed with {} errors\", error_count);\\n        return Err(\"Seeding completed with errors\".into());\\n    }\\n    \\n    Ok(())\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27617, "label": "PatientGeneratorConfig", "group": "Module", "title": "{'name': 'PatientGeneratorConfig', 'full_import_name': 'use opengp::infrastructure::fixtures::{PatientGenerator, PatientGeneratorConfig};'}", "color": "#97c2fc"}, {"id": 28718, "label": "main", "group": "Function", "title": "{'name': 'main', 'path': '/home/stephenp/Documents/opengp/examples/clear_and_seed.rs', 'line_number': 10, 'end_line': 80, 'params': [], 'args': [], 'source': 'async fn main() -> Result<(), Box<dyn std::error::Error>> {\\n    println!(\"OpenGP Clear & Seed Tool\\\\n\");\\n    println!(\"========================\\\\n\");\\n\\n    println!(\"\u26a0\ufe0f  WARNING: This will DELETE ALL patients and reseed with fresh data!\\\\n\");\\n\\n    let config = Config::from_env()?;\\n    let pool = create_pool(&config.database).await?;\\n    run_migrations(&pool).await?;\\n\\n    println!(\"Database: {}\\\\n\", config.database.url);\\n\\n    let crypto = Arc::new(EncryptionService::new()?);\\n    let patient_repository = Arc::new(SqlxPatientRepository::new(pool.clone(), crypto));\\n\\n    println!(\"\u26a0\ufe0f  Note: This tool adds patients without clearing existing data\\\\n\");\\n    println!(\"For a clean slate, delete the database file and run again.\\\\n\");\\n\\n    let gen_config = PatientGeneratorConfig {\\n        count: 30,\\n        min_age: 0,\\n        max_age: 100,\\n        include_children: true,\\n        include_seniors: true,\\n        medicare_percentage: 0.95,\\n        ihi_percentage: 0.90,\\n        mobile_percentage: 0.85,\\n        email_percentage: 0.70,\\n    };\\n\\n    println!(\"Generating nfig.email_percentage * 100.0);\\n    println!();\\n\\n    let mut generator = PatientGenerator::new(config);\\n    let patients = generator.generate();\\n\\n    println!(\"Generated {} patients:\\\\n\", patients.len());\\n\\n    for (i, patient) in patients.iter().enumerate() {\\n        print_patient_summary(i + 1, patient);\\n    }\\n\\n    print_statistics(&patients);\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27620, "label": "print_patient_summary", "group": "Function", "title": "{'name': 'print_patient_summary', 'path': '/home/stephenp/Documents/opengp/examples/generate_patients.rs', 'line_number': 46, 'end_line': 87, 'params': ['num: usize', 'patient: &Patient'], 'args': ['num: usize', 'patient: &Patient'], 'source': 'fn print_patient_summary(num: usize, patient: &Patient) {\\n    let name = format!(\\n        \"{}, {}\",\\n        patient.last_name,\\n        patient\\n            .preferred_name\\n            .as_ref()\\n            .unwrap_or(&patient.first_name)\\n    );\\n\\n    let age = patient.age();\\n    let gender = match patient.gender {\\n        opengp::domain::patient::Gender::Male => \"M\",\\n        opengp::domain::patient::Gender::Female => \"F\",\\n        opengp::domain::patient::Gender::Other => \"O\",\\n        opengp::domain::patient::Gender::PreferNotToSay => \"P\",\\n    };\\n\\n    let medicare = patient\\n        .medicare_number\\n        .as_ref()\\n        .map(|m| {\\n            if let Some(irn) = patient.medicare_irn {\\n                format!(\"{}-{}\", m, irn)\\n            } else {\\n                m.clone()\\n            }\\n        })\\n        .unwrap_or_else(|| \"-\".to_string());\\n\\n    let phone = patient\\n        .phone_mobile\\n        .as_ref()\\n        .or(patient.phone_home.as_ref())\\n        .cloned()\\n        .unwrap_or_else(|| \"-\".to_string());\\n\\n    println!(\\n        \"{:3}. {:30} Age: {:3} ({}) Medicare: {:15} Phone: {}\",\\n        num, name, age, gender, medicare, phone\\n    );\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27623, "label": "print_statistics", "group": "Function", "title": "{'name': 'print_statistics', 'path': '/home/stephenp/Documents/opengp/examples/generate_patients.rs', 'line_number': 89, 'end_line': 150, 'params': ['patients: &[Patient]'], 'args': ['patients: &[Patient]'], 'source': 'fn print_statistics(patients: &[Patient]) {\\n    println!(\"\\\\n=================================\");\\n    println!(\"Statistics:\");\\n    println!(\"=================================\\\\n\");\\n\\n    let male_count = patients\\n        .iter()\\n        .filter(|p| p.gender == opengp::domain::patient::Gender::Male)\\n        .count();\\n    let female_count = patients\\n        .iter()\\n        .filter(|p| p.gender == opengp::domain::patient::Gender::Female)\\n        .count();\\n\\n    println!(\"Gender Distribution:\");\\n    println!(\"  Male: {}\", male_count);\\n    println!(\"  Female: {}\", female_count);\\n    println!();\\n\\n    let children = patients.iter().filter(|p| p.age() < 18).count();\\n    let adults = patients\\n        .iter()\\n        .filter(|p| p.age() >= 18 && p.age() < 65)\\n        .count();\\n    let seniors = patients.iter().filter(|p| p.age() >= 65).count();\\n\\n    println!(\"Age Distribution:\");\\n    println!(\"  Children (<18): {}\", children);\\n    println!(\"  Adults (18-64): {}\", adults);\\n    println!(\"  Seniors (65+): {}\", seniors);\\n    println!();\\n\\n    let with_medicare = patients\\n        .iter()\\n        .filter(|p| p.medicare_number.is_some())\\n        .count();\\n    let with_ihi = patients.iter().filter(|p| p.ihi.is_some()).count();\\n    let with_mobile = patients.iter().filter(|p| p.phone_mobile.is_some()).count();\\n    let with_email = patients.iter().filter(|p| p.email.is_some()).count();\\n\\n    println!(\"Contact Information:\");\\n    println!(\\n        \"  With Medicare: {} ({:.1}%)\",\\n        with_medicare,\\n        (with_medicare

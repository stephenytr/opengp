mber': 9, 'end_line': 75, 'params': [], 'args': [], 'source': 'async fn main() -> Result<(), Box<dyn std::error::Error>> {\\n    println!(\"OpenGP Database Seeding Tool\\\\n\");\\n    println!(\"============================\\\\n\");\\n\\n    let config = Config::from_env()?;\\n    let pool = create_pool(&config.database).await?;\\n    run_migrations(&pool).await?;\\n\\n    println!(\"Database connected: {}\\\\n\", config.database.url);\\n\\n    let patient_repository = Arc::new(SqlxPatientRepository::new(pool.clone()));\\n\\n    println!(\"Ready to seed database\\\\n\");\\n\\n    let gen_config = PatientGeneratorConfig {\\n        count: 1000,\\n        min_age: 0,\\n        max_age: 100,\\n        include_children: true,\\n        include_seniors: true,\\n        medicare_percentage: 0.95,\\n        ihi_percentage: 0.90,\\n        mobile_percentage: 0.85,\\n        email_percentage: 0.70,\\n    };\\n\\n    println!(\"Generating {} patients...\", gen_config.count);\\n    let mut generator = PatientGenerator::new(gen_config);\\n    let patients = generator.generate();\\n\\n    println!(\"Inserting patients into database...\\\\n\");\\n\\n    let mut success_count = 0;\\n    let mut error_count = 0;\\n\\n    for (i, patient) in patients.iter().enumerate() {\\n        match patient_repository.create(patient.clone()).await {\\n            Ok(_) => {\\n                success_count += 1;\\n                if (i + 1) % 10 == 0 {\\n                    println!(\"  Inserted {} patients...\", i + 1);\\n                }\\n            }\\n            Err(e) => {\\n                error_count += 1;\\n                eprintln!(\"  Error inserting patient {}: {}\", patient.first_name, e);\\n            }\\n        }\\n    }\\n\\n    println!();\\n    println!(\"============================\");\\n    println!(\"Results:\");\\n    println!(\"============================\");\\n    println!(\"  Successfully inserted: {}\", success_count);\\n    println!(\"  Errors: {}\", error_count);\\n    println!();\\n\\n    if error_count > 0 {\\n        println!(\"Warning: Some patients failed to insert. Check error messages above.\");\\n        return Err(\"Seeding completed with errors\".into());\\n    }\\n\\n    println!(\"Database seeding completed successfully!\");\\n\\n    Ok(())\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 28719, "label": "main", "group": "Function", "title": "{'name': 'main', 'path': '/home/stephenp/Documents/opengp/examples/seed_database.rs', 'line_number': 10, 'end_line': 77, 'params': [], 'args': [], 'source': 'async fn main() -> Result<(), Box<dyn std::error::Error>> {\\n    println!(\"OpenGP Database Seeding Tool\\\\n\");\\n    println!(\"============================\\\\n\");\\n\\n    let config = Config::from_env()?;\\n    let pool = create_pool(&config.database).await?;\\n    run_migrations(&pool).await?;\\n\\n    println!(\"Database connected: {}\\\\n\", config.database.url);\\n\\n    let crypto = Arc::new(EncryptionService::new()?);\\n    let patient_repository = Arc::new(SqlxPatientRepository::new(pool.clone(), crypto));\\n\\n    println!(\"Ready to seed database\\\\n\");\\n\\n    let gen_config = PatientGeneratorConfig {\\n        count: 1000,\\n        min_age: 0,\\n        max_age: 100,\\n        include_children: true,\\n        include_seniors: true,\\n        medicare_percentage: 0.95,\\n        ihi_percentage: 0.90,\\n        mobile_percentage: 0.85,\\n        email_percentage: 0.70,\\n    };\\n\\n    println!(\"Generating {} patients...\", gen_config.count);\\n    let mut generator = PatientGenerator::new(gen_config);\\n    let patients = generator.generate();\\n\\n    println!(\"Inserting patients into database...\\\\n\");\\n\\n    let mut success_count = 0;\\n    let mut error_count = 0;\\n\\n    for (i, patient) in patients.iter().enumerate() {\\n        match patient_repository.create(patient.clone()).await {\\n            Ok(_) => {\\n                success_count += 1;\\n                if (i + 1) % 10 == 0 {\\n                    println!(\"  Inserted {} patients...\", i + 1);\\n                }\\n            }\\n            Err(e) => {\\n                error_count += 1;\\n                eprintln!(\"  Error inserting patient {}: {}\", patient.first_name, e);\\n            }\\n        }\\n    }\\n\\n    println!();\\n    println!(\"============================\");\\n    println!(\"Results:\");\\n    println!(\"============================\");\\n    println!(\"  Successfully inserted: {}\", success_count);\\n    println!(\"  Errors: {}\", error_count);\\n    println!();\\n\\n    if error_count > 0 {\\n        println!(\"Warning: Some patients failed to insert. Check error messages above.\");\\n        return Err(\"Seeding completed with errors\".into());\\n    }\\n\\n    println!(\"Database seeding completed successfully!\");\\n\\n    Ok(())\\n}', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27630, "label": ".undodir", "group": "Directory", "title": "{'path': '/home/stephenp/Documents/opengp/~/.undodir', 'name': '.undodir'}", "color": "#97c2fc"}, {"id": 27628, "label": "%home%stephenp%Documents%opengp%examples%generate_patients.rs", "group": "File", "title": "{'path': '/home/stephenp/Documents/opengp/~/.undodir/%home%stephenp%Documents%opengp%examples%generate_patients.rs', 'name': '%home%stephenp%Documents%opengp%examples%generate_patients.rs', 'relative_path': '~/.undodir/%home%stephenp%Documents%opengp%examples%generate_patients.rs', 'is_dependency': False}", "color": "#baffc9"}, {"id": 27631, "label": "%home%stephenp%Documents%opengp%examples%seed_database.rs", "group": "File", "title": "{'path': '/home/stephenp/Documents/opengp/~/.undodir/%home%stephenp%Documents%opengp%examples%seed_database.rs', 'name': '%home%stephenp%Documents%opengp%examples%seed_database.rs', 'relative_path': '~/.undodir/%home%stephenp%Documents%opengp%examples%seed_database.rs', 'is_dependency': False}", "color": "#baffc9"}, {"id": 28735, "label": "%home%st test_create_pool_in_memory", "group": "Function", "title": "{'name': 'test_create_pool_in_memory', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/database/mod.rs', 'line_number': 123, 'end_line': 131, 'params': [], 'args': [], 'source': 'async fn test_create_pool_in_memory() {\\n        let config = DatabaseConfig {\\n            url: \"sqlite::memory:\".to_string(),\\n            ..Default::default()\\n        };\\n\\n        let pool = create_pool(&config).await;\\n        assert!(pool.is_ok());\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27707, "label": "test_health_check", "group": "Function", "title": "{'name': 'test_health_check', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/database/mod.rs', 'line_number': 134, 'end_line': 143, 'params': [], 'args': [], 'source': 'async fn test_health_check() {\\n        let config = DatabaseConfig {\\n            url: \"sqlite::memory:\".to_string(),\\n            ..Default::default()\\n        };\\n\\n        let pool = create_pool(&config).await.unwrap();\\n        let result = health_check(&pool).await;\\n        assert!(result.is_ok());\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27708, "label": "DatabaseConfig", "group": "Class", "title": "{'name': 'DatabaseConfig', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/database/mod.rs', 'line_number': 16, 'end_line': 22, 'bases': [], 'source': 'pub struct DatabaseConfig {\\n    pub url: String,\\n    pub max_connections: u32,\\n    pub min_connections: u32,\\n    pub connect_timeout_secs: u64,\\n    pub idle_timeout_secs: u64,\\n}'}", "color": "#bae1ff"}, {"id": 27709, "label": "SqlitePoolOptions", "group": "Module", "title": "{'name': 'SqlitePoolOptions', 'full_import_name': 'use sqlx::sqlite::{SqliteConnectOptions, SqlitePoolOptions};'}", "color": "#97c2fc"}, {"id": 27710, "label": "FromStr", "group": "Module", "title": "{'name': 'FromStr', 'full_import_name': 'use std::str::FromStr;'}",  'pub fn new() -> Result<Self, CryptoError> {\\n        let key_bytes = Self::load_key_from_env()?;\\n        let cipher = Aes256Gcm::new_from_slice(&key_bytes).map_err(|_| CryptoError::InvalidKey)?;\\n\\n        Ok(Self { cipher })\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27717, "label": "encrypt", "group": "Function", "title": "{'name': 'encrypt', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 115, 'end_line': 132, 'params': ['&self: self', 'plaintext: &str'], 'args': ['&self: self', 'plaintext: &str'], 'source': 'pub fn encrypt(&self, plaintext: &str) -> Result<Vec<u8>, CryptoError> {\\n        // Generate random 12-byte nonce\\n        let nonce_bytes: [u8; 12] = rand::thread_rng().gen();\\n        let nonce = Nonce::from_slice(&nonce_bytes);\\n\\n        // Encrypt plaintext\\n        let ciphertext = self\\n            .cipher\\n            .encrypt(nonce, plaintext.as_bytes())\\n            .map_err(|_| CryptoError::EncryptionFailed)?;\\n\\n        // Prepend nonce to ciphertext for storage\\n        // Format: [12 bytes nonce][ciphertext + 16 bytes tag]\\n        let mut result = nonce_bytes.to_vec();\\n        result.extend(ciphertext);\\n\\n        Ok(result)\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27720, "label": "decrypt", "group": "Function", "title": "{'name': 'decrypt', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 168, 'end_line': 185, 'params': ['&self: self', 'encrypted: &[u8]'], 'args': ['&self: self', 'encrypted: &[u8]'], 'source': 'pub fn decrypt(&self, encrypted: &[u8]) -> Result<String, CryptoError> {\\n        // Validate minimum length (12 bytes nonce + 16 bytes tag)\\n        if encrypted.len() < 12 {\\n            return Err(CryptoError::InvalidCiphertext);\\n        }\\n\\n        // Extract nonce (first 12 bytes)\\n        let nonce = Nonce::from_slice(&encrypted[..12]);\\n\\n        // Decrypt remaining bytes (ciphertext + tag)\\n        let plaintext = self\\n            .cipher\\n            .decrypt(nonce, &encrypted[12..])\\n            .map_err(|_| CryptoError::DecryptionFailed)?;\\n\\n        // Convert to UTF-8 string\\n        String::from_utf8(plaintext).map_err(|_| CryptoError::InvalidUtf8)\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27723, "label": "load_key_from_env", "group": "Function", "title": "{'name': 'load_key_from_env', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 190, 'end_line': 202, 'params': [], 'args': [], 'source': 'fn load_key_from_env() -> Result<Vec<u8>, CryptoError> {\\n        let key_hex = std::env::var(\"ENCRYPTION_KEY\").map_err(|_| CryptoError::MissingKey)?;\\n\\n        // Decode hex string to bytes\\n        let key_bytes = hex::decode(key_hex).map_err(|_| CryptoError::InvalidKeyFormat)?;\\n\\n        // Validate key length (must be 32 bytes for AES-256)\\n        if key_bytes.len() != 32 {\\n            return Err(CryptoError::InvalidKeyLength(key_bytes.len()));\\n        }\\n\\n        Ok(key_bytes)\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27724, "label": "generate_test_key", "group": "Function", "title": "{'name': 'generate_test_key', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 238, 'end_line': 241, 'params': [], 'args': [], 'source': 'fn generate_test_key() -> String {\\n        let key: [u8; 32] = rand::thread_rng().gen();\\n        hex::encode(key)\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27725, "label": "test_new_with_valid_key", "group": "Function", "title": "{'name': 'test_new_with_valid_key', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 244, 'end_line': 250, 'params': [], 'args': [], 'source': 'fn test_new_with_valid_key() {\\n        let key = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key);\\n\\n        let result = EncryptionService::new();\\n        assert!(result.is_ok());\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27726, "label": "test_new_without_key", "group": "Function", "title": "{'name': 'test_new_without_key', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 253, 'end_line': 259, 'params': [], 'args': [], 'source': 'fn test_new_without_key() {\\n        std::env::remove_var(\"ENCRYPTION_KEY\");\\n\\n        let result = EncryptionService::new();\\n        assert!(result.is_err());\\n        assert!(matches!(result.unwrap_err(), CryptoError::MissingKey));\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27727, "label": "test_new_with_invalid_hex", "group": "Function", "title": "{'name': 'test_new_with_invalid_hex', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 262, 'end_line': 268, 'params': [], 'args': [], 'source': 'fn test_new_with_invalid_hex() {\\n        std::env::set_var(\"ENCRYPTION_KEY\", \"not_hex_data\");\\n\\n        let result = EncryptionService::new();\\n        assert!(result.is_err());\\n        assert!(matches!(result.unwrap_err(), CryptoError::InvalidKeyFormat));\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27728, "label": "test_new_with_wrong_length_key", "group": "Function", "title": "{'name': 'test_new_with_wrong_length_key', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 271, 'end_line': 282, 'params': [], 'args': [], 'source': 'fn test_new_with_wrong_length_key() {\\n        // 16 bytes instead of 32\\n        let key = hex::encode([0u8; 16]);\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key);\\n\\n        let result = EncryptionService::new();\\n        assert!(result.is_err());\\n        assert!(matches!(\\n            result.unwrap_err(),\\n            CryptoError::InvalidKeyLength(16)\\n        ));\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27729, "label": "test_encrypt_decrypt", "group": "Function", "title": "{'name': 'test_encrypt_decrypt', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 285, 'end_line': 301, 'params': [], 'args': [], 'source': 'fn test_encrypt_decrypt() {\\n        let key = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key);\\n\\n        let crypto = EncryptionService::new().unwrap();\\n        let plaintext = \"sensitive patient data\";\\n\\n        // Encrypt\\n        let encrypted = crypto.encrypt(plaintext).unwrap();\\n\\n        // Should be longer than plaintext (nonce + tag)\\n        assert!(encrypted.len() > plaintext.len());\\n\\n        // Decrypt\\n        let decrypted = crypto.decrypt(&encrypted).unwrap();\\n        assert_eq!(plaintext, decrypted);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27730, "label": "test_encrypt_produces_different_ciphertext", "group": "Function", "title": "{'name': 'test_encrypt_produces_different_ciphertext', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 304, 'end_line': 321, 'params': [], 'args': [], 'source': 'fn test_encrypt_produces_different_ciphertext() {\\n        let key = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key);\\n\\n        let crypto = EncryptionService::new().unwrap();\\n        let plaintext = \"test data\";\\n\\n        // Encrypt same plaintext twice\\n        let encrypted1 = crypto.encrypt(plaintext).unwrap();\\n        let encrypted2 = crypto.encrypt(plaintext).unwrap();\\n\\n        // Should produce different ciphertext due to random nonce\\n        assert_ne!(encrypted1, encrypted2);\\n\\n        // But both should decrypt to same plaintext\\n        assert_eq!(crypto.decrypt(&encrypted1).unwrap(), plaintext);\\n        assert_eq!(crypto.decrypt(&encrypted2).unwrap(), plaintext);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27731, "label": "test_decrypt_with_wrong_key", "group": "Function", "title": "{'name': 'test_decrypt_with_wrong_key', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 324, 'end_line': 339, 'params': [], 'args': [], 'source': 'fn test_decrypt_with_wrong_key() {\\n        // Encrypt with one key\\n        let key1 = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key1);\\n        let crypto1 = EncryptionService::new().unwrap();\\n        let encrypted = crypto1.encrypt(\"secret\").unwrap();\\n\\n        // Try to decrypt with different key\\n        let key2 = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key2);\\n        let crypto2 = EncryptionService::new().unwrap();\\n\\n        let result = crypto2.decrypt(&encrypted);\\n        assert!(result.is_err());\\n        assert!(matches!(result.unwrap_err(), CryptoError::DecryptionFailed));\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27732, "label": "test_decrypt_invalid_ciphertext", "group": "Function", "title": "{'name': 'test_decrypt_invalid_ciphertext', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 342, 'end_line': 361, 'params': [], 'args': [], 'source': 'fn test_decrypt_invalid_ciphertext() {\\n        let key = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key);\\n        let crypto = EncryptionService::new().unwrap();\\n\\n        // Too short\\n        let result = crypto.decrypt(&[0u8; 10]);\\n        assert!(result.is_err());\\n        assert!(matches!(\\n            result.unwrap_err(),\\n            CryptoError::InvalidCiphertext\\n        ));\\n\\n        // Corrupted data\\n        let mut encrypted = crypto.encrypt(\"test\").unwrap();\\n        encrypted[15] ^= 0xFF; // Flip bits in ciphertext\\n        let result = crypto.decrypt(&encrypted);\\n        assert!(result.is_err());\\n        assert!(matches!(result.unwrap_err(), CryptoError::DecryptionFailed));\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27733, "label": "test_encrypt_empty_string", "group": "Function", "title": "{'name': 'test_encrypt_empty_string', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 364, 'end_line': 372, 'params': [], 'args': [], 'source': 'fn test_encrypt_empty_string() {\\n        let key = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key);\\n        let crypto = EncryptionService::new().unwrap();\\n\\n        let encrypted = crypto.encrypt(\"\").unwrap();\\n        let decrypted = crypto.decrypt(&encrypted).unwrap();\\n        assert_eq!(\"\", decrypted);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27734, "label": "test_encrypt_unicode", "group": "Function", "title": "{'name': 'test_encrypt_unicode', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 375, 'end_line': 384, 'params': [], 'args': [], 'source': 'fn test_encrypt_unicode() {\\n        let key = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key);\\n        let crypto = EncryptionService::new().unwrap();\\n\\n        let plaintext = \"Test with \u00e9mojis \ud83d\udd12 and \u00fcn\u00efc\u00f6d\u00eb\";\\n        let encrypted = crypto.encrypt(plaintext).unwrap();\\n        let decrypted = crypto.decrypt(&encrypted).unwrap();\\n        assert_eq!(plaintext, decrypted);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27735, "label": "test_encrypt_long_text", "group": "Function", "title": "{'name': 'test_encrypt_long_text', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 387, 'end_line': 397, 'params': [], 'args': [], 'source': 'fn test_encrypt_long_text() {\\n        let key = generate_test_key();\\n        std::env::set_var(\"ENCRYPTION_KEY\", &key);\\n        let crypto = EncryptionService::new().unwrap();\\n\\n        // Test with clinical notes length data\\n        let plaintext = \"S: Patient presents with headache for 3 days. \".repeat(50);\\n        let encrypted = crypto.encrypt(&plaintext).unwrap();\\n        let decrypted = crypto.decrypt(&encrypted).unwrap();\\n        assert_eq!(plaintext, decrypted);\\n    }', 'cyclomatic_complexity': 1}", "color": "#ffffba"}, {"id": 27736, "label": "EncryptionService", "group": "Class", "title": "{'name': 'EncryptionService', 'path': '/home/stephenp/Documents/opengp/src/infrastructure/crypto/mod.rs', 'line_number': 43, 'end_line': 45, 'bases': [], 'source': 'pub struct EncryptionService {\\n    cipher: Aes256Gcm,\\n}'}", "color": "#bae1ff"}]);

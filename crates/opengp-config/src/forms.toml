[forms.vitals]
title = "Vital Signs"

[[forms.vitals.fields]]
id = "systolic_bp"
label = "Systolic BP (mmHg)"
type = "numeric"
required = false
visible = true
navigable = true

[forms.vitals.fields.validation]
numeric_range = { min = 50.0, max = 300.0 }

[[forms.vitals.fields]]
id = "diastolic_bp"
label = "Diastolic BP (mmHg)"
type = "numeric"
required = false
visible = true
navigable = true

[forms.vitals.fields.validation]
numeric_range = { min = 20.0, max = 200.0 }

[[forms.vitals.fields]]
id = "heart_rate"
label = "Heart Rate (bpm)"
type = "numeric"
required = false
visible = true
navigable = true

[forms.vitals.fields.validation]
numeric_range = { min = 20.0, max = 300.0 }

[[forms.vitals.fields]]
id = "respiratory_rate"
label = "Respiratory Rate"
type = "numeric"
required = false
visible = true
navigable = true

[forms.vitals.fields.validation]
numeric_range = { min = 4.0, max = 60.0 }

[[forms.vitals.fields]]
id = "temperature"
label = "Temperature (C)"
type = "numeric"
required = false
visible = true
navigable = true

[forms.vitals.fields.validation]
numeric_range = { min = 30.0, max = 45.0 }

[[forms.vitals.fields]]
id = "oxygen_saturation"
label = "O2 Saturation (%)"
type = "numeric"
required = false
visible = true
navigable = true

[forms.vitals.fields.validation]
numeric_range = { min = 50.0, max = 100.0 }

[[forms.vitals.fields]]
id = "height"
label = "Height (cm)"
type = "numeric"
required = false
visible = true
navigable = true

[forms.vitals.fields.validation]
numeric_range = { min = 30.0, max = 300.0 }

[[forms.vitals.fields]]
id = "weight"
label = "Weight (kg)"
type = "numeric"
required = false
visible = true
navigable = true

[forms.vitals.fields.validation]
numeric_range = { min = 0.5, max = 700.0 }

[[forms.vitals.fields]]
id = "notes"
label = "Notes"
type = "textarea"
required = false
visible = true
navigable = true

[[forms.vitals.rules]]
type = "any_not_empty"
fields = ["systolic_bp", "diastolic_bp", "heart_rate", "respiratory_rate", "temperature", "oxygen_saturation", "height", "weight"]
message = "At least one measurement is required"


# OpenGP Docker Compose - Backend Only
# Usage: docker-compose up --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: opengp-postgres
    environment:
      POSTGRES_USER: opengp
      POSTGRES_PASSWORD: opengp_dev_password
      POSTGRES_DB: opengp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - opengp-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: opengp-api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8080
      API_DATABASE_URL: postgres://opengp:opengp_dev_password@postgres:5432/opengp
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      RUST_LOG: info
      RUST_BACKTRACE: 1
    ports:
      - "8080:8080"
    volumes:
      - "./MBS-XML-20260301-version 2.XML:/app/MBS-XML-20260301-version 2.XML:ro"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - opengp-network

volumes:
  postgres_data:

networks:
  opengp-network:
    driver: bridge
